<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背包组件测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #3b82f6;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .test-section {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #0f3460;
        }
        
        h2 {
            color: #66ccff;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .bag-container {
            margin: 10px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }
        
        .test-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .message {
            margin-top: 15px;
            padding: 10px;
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid #10b981;
            border-radius: 4px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>背包组件测试</h1>
        
        <!-- 测试1：完整模式 -->
        <div class="test-section">
            <h2>测试1：完整模式</h2>
            <p>显示所有物品，带有使用和丢弃按钮</p>
            <div id="full-bag" class="bag-container"></div>
            <div class="test-buttons">
                <button class="btn btn-primary" onclick="loadFullBag()">加载完整背包</button>
            </div>
        </div>
        
        <!-- 测试2：选择模式 -->
        <div class="test-section">
            <h2>测试2：选择模式</h2>
            <p>点击物品进行选择</p>
            <div id="select-bag" class="bag-container"></div>
            <div class="message" id="select-message">选择一个物品...</div>
            <div class="test-buttons">
                <button class="btn btn-primary" onclick="loadSelectBag()">加载选择模式背包</button>
            </div>
        </div>
        
        <!-- 测试3：多栏显示 -->
        <div class="test-section">
            <h2>测试3：多栏显示</h2>
            <p>分别显示装备和材料</p>
            <div class="grid">
                <div id="equipment-bag" class="bag-container"></div>
                <div id="material-bag" class="bag-container"></div>
            </div>
            <div class="test-buttons">
                <button class="btn btn-primary" onclick="loadMultiBag()">加载多栏背包</button>
            </div>
        </div>
        
        <!-- 测试4：强化系统模拟 -->
        <div class="test-section">
            <h2>测试4：强化系统模拟</h2>
            <p>左侧选择装备，右侧选择材料</p>
            <div class="grid">
                <div id="enhance-equipment" class="bag-container"></div>
                <div id="enhance-materials" class="bag-container"></div>
            </div>
            <div class="message" id="enhance-message">选择装备和材料...</div>
            <div class="test-buttons">
                <button class="btn btn-primary" onclick="loadEnhanceBag()">加载强化系统背包</button>
                <button class="btn btn-success" onclick="simulateEnhance()">模拟强化</button>
            </div>
        </div>
    </div>
    
    <!-- 引入核心文件 -->
    <script src="js/core/state.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/core/ui.js"></script>
    <script src="js/core/bag-component.js"></script>
    
    <script>
        // 选择的物品
        let selectedEquipment = null;
        let selectedMaterial = null;
        
        // 加载完整模式背包
        function loadFullBag() {
            BagComponent.initBag('full', 'full-bag', {
                mode: 'full'
            });
            BagComponent.load();
        }
        
        // 加载选择模式背包
        function loadSelectBag() {
            BagComponent.initBag('select', 'select-bag', {
                mode: 'select',
                onSelect: function(item) {
                    document.getElementById('select-message').textContent = `选择了物品: ${item.name} (ID: ${item.id})`;
                }
            });
            BagComponent.load();
        }
        
        // 加载多栏背包
        function loadMultiBag() {
            // 装备栏
            BagComponent.initBag('equipment', 'equipment-bag', {
                mode: 'full',
                typeFilter: 'equipment'
            });
            
            // 材料栏
            BagComponent.initBag('materials', 'material-bag', {
                mode: 'full',
                typeFilter: 'material'
            });
            
            BagComponent.load();
        }
        
        // 加载强化系统背包
        function loadEnhanceBag() {
            // 装备栏
            BagComponent.initBag('enhance-equip', 'enhance-equipment', {
                mode: 'select',
                typeFilter: 'equipment',
                onSelect: function(item) {
                    selectedEquipment = item;
                    updateEnhanceMessage();
                }
            });
            
            // 材料栏
            BagComponent.initBag('enhance-mats', 'enhance-materials', {
                mode: 'select',
                typeFilter: 'material',
                onSelect: function(item) {
                    selectedMaterial = item;
                    updateEnhanceMessage();
                }
            });
            
            BagComponent.load();
        }
        
        // 更新强化系统消息
        function updateEnhanceMessage() {
            const msg = document.getElementById('enhance-message');
            if (selectedEquipment && selectedMaterial) {
                msg.textContent = `已选择装备: ${selectedEquipment.name} 和材料: ${selectedMaterial.name}`;
            } else if (selectedEquipment) {
                msg.textContent = `已选择装备: ${selectedEquipment.name}，请选择材料`;
            } else if (selectedMaterial) {
                msg.textContent = `已选择材料: ${selectedMaterial.name}，请选择装备`;
            } else {
                msg.textContent = '选择装备和材料...';
            }
        }
        
        // 模拟强化
        function simulateEnhance() {
            if (!selectedEquipment) {
                UI.showToast('请选择装备');
                return;
            }
            if (!selectedMaterial) {
                UI.showToast('请选择材料');
                return;
            }
            
            UI.showToast(`模拟强化 ${selectedEquipment.name} 使用 ${selectedMaterial.name}`);
            // 模拟强化后刷新背包
            setTimeout(() => {
                BagComponent.refreshAll();
            }, 1000);
        }
        
        // 页面加载时初始化
        window.onload = function() {
            // 可以在这里添加初始化逻辑
        };
    </script>
</body>
</html>
