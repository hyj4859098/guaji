# SonarCloud 代码质量扫描 - Bug、漏洞、坏味道、重复代码
# 需在 https://sonarcloud.io 导入仓库，并在 GitHub Secrets 配置 SONAR_TOKEN
name: SonarCloud

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            text-rpg-game/server/package-lock.json
            text-rpg-game/package-lock.json

      - name: Install server dependencies
        working-directory: text-rpg-game/server
        run: npm ci

      - name: Install client dependencies
        working-directory: text-rpg-game
        run: npm ci

      - name: Build
        working-directory: text-rpg-game/server
        run: npm run build

      - name: Init MongoDB
        working-directory: text-rpg-game/server
        run: node init-mongodb.js
        env:
          MONGODB_DATABASE: turn-based-game-test

      - name: Seed E2E test data
        working-directory: text-rpg-game/server
        run: node seed-e2e.js
        env:
          MONGODB_DATABASE: turn-based-game-test

      - name: Create test admin
        working-directory: text-rpg-game/server
        run: node ../scripts/create-test-admin.js
        env:
          MONGODB_DATABASE: turn-based-game-test

      - name: Run tests with coverage
        working-directory: text-rpg-game/server
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: false
